services:
  mysql:
    image: mysql:8.4
    container_name: crm_mysql_prod
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - crm_prod_network

  redis:
    image: redis:7.4-alpine
    container_name: crm_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_prod_data:/data
    networks:
      - crm_prod_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: crm_api_prod
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL}
      OPENAI_REQUEST_TIMEOUT_MS: ${OPENAI_REQUEST_TIMEOUT_MS}
      NOVA_POSHTA_ENABLED: ${NOVA_POSHTA_ENABLED}
      NOVA_POSHTA_BASE_URL: ${NOVA_POSHTA_BASE_URL}
      NOVA_POSHTA_API_URL: ${NOVA_POSHTA_BASE_URL}
      NOVA_POSHTA_REQUEST_TIMEOUT_MS: ${NOVA_POSHTA_REQUEST_TIMEOUT_MS}
      NOVA_POSHTA_API_KEY: ${NOVA_POSHTA_API_KEY}
      NOVA_POSHTA_SENDER_NAME: ${NOVA_POSHTA_SENDER_NAME}
      NOVA_POSHTA_SENDER_REF: ${NOVA_POSHTA_SENDER_REF}
      NOVA_POSHTA_SENDER_CITY_REF: ${NOVA_POSHTA_SENDER_CITY_REF}
      NOVA_POSHTA_SENDER_WAREHOUSE_REF: ${NOVA_POSHTA_SENDER_WAREHOUSE_REF}
      NOVA_POSHTA_SENDER_ADDRESS_REF: ${NOVA_POSHTA_SENDER_WAREHOUSE_REF}
      NOVA_POSHTA_SENDER_CONTACT_REF: ${NOVA_POSHTA_SENDER_CONTACT_REF}
      NOVA_POSHTA_SENDER_PHONE: ${NOVA_POSHTA_SENDER_PHONE}
      NOVA_POSHTA_DEFAULT_SERVICE_TYPE: ${NOVA_POSHTA_DEFAULT_SERVICE_TYPE}
      NOVA_POSHTA_DEFAULT_PAYER_TYPE: ${NOVA_POSHTA_DEFAULT_PAYER_TYPE}
      NOVA_POSHTA_DEFAULT_PAYMENT_METHOD: ${NOVA_POSHTA_DEFAULT_PAYMENT_METHOD}
      NOVA_POSHTA_DEFAULT_CARGO_TYPE: ${NOVA_POSHTA_DEFAULT_CARGO_TYPE}
      NOVA_POSHTA_DEFAULT_WEIGHT: ${NOVA_POSHTA_DEFAULT_WEIGHT}
      NOVA_POSHTA_DEFAULT_SEATS_AMOUNT: ${NOVA_POSHTA_DEFAULT_SEATS_AMOUNT}
    command: >
      sh -c "npm run prisma:migrate:deploy --workspace apps/api && node apps/api/dist/main.js"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/api/health >/dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - crm_prod_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    container_name: crm_web_prod
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      API_BASE_URL: http://api:3001/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/login >/dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - crm_prod_network

  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx_prod
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
      - '${NGINX_HTTPS_PORT:-443}:443'
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm_prod_network

volumes:
  mysql_prod_data:
  redis_prod_data:

networks:
  crm_prod_network:
    driver: bridge
