upstream crm_web_upstream {
  server web:3000;
}

upstream crm_api_upstream {
  server api:3001;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  location /api/ {
    proxy_pass http://crm_api_upstream/api/;
    proxy_read_timeout 60s;
  }

  location / {
    proxy_pass http://crm_web_upstream;
    proxy_read_timeout 60s;
  }
}

# SSL-ready note:
# Add a second server block for 443 with ssl_certificate / ssl_certificate_key
# or terminate TLS at the VPS/load balancer level and keep this config as the HTTP upstream.
